services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: excalidash-backend
    environment:
      - DATABASE_PROVIDER=sqlite
      - DATABASE_URL=file:/app/prisma/dev.db
      - PORT=8000
      - NODE_ENV=production
      - AUTH_MODE=${AUTH_MODE:-local}
      # Keep disabled by default; only enable when a trusted proxy sanitizes forwarded headers.
      - TRUST_PROXY=false
      # Optional for single-instance deployments:
      # if unset, backend auto-generates and persists one in the volume.
      # Recommended to set explicitly for portability and multi-instance setups.
      - JWT_SECRET=${JWT_SECRET}
      - CSRF_SECRET=${CSRF_SECRET}
      # # Local OIDC settings for dev compose.
      # - OIDC_PROVIDER_NAME=Keycloak
      # # Browser-facing issuer URL.
      # - OIDC_ISSUER_URL=http://localhost:8080/realms/excalidash/
      # # Backend-only discovery URL on the shared container network.
      # - OIDC_DISCOVERY_URL=http://keycloak:8080/realms/excalidash/
      # - OIDC_CLIENT_ID=excalidash
      # # Local OIDC test secret; align with oidc/keycloak/realm-excalidash.json.
      # - OIDC_ID_TOKEN_SIGNED_RESPONSE_ALG=RS256
      # - OIDC_CLIENT_SECRET=excalidash-dev-secret
      # - OIDC_REDIRECT_URI=http://localhost:6767/api/auth/oidc/callback
      # - OIDC_SCOPES=openid profile email
      # - OIDC_ADMIN_GROUPS=admins
    volumes:
      - backend-data:/app/prisma
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      # Use IPv4 loopback explicitly to avoid IPv6 localhost resolution issues.
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: excalidash-frontend
    ports:
      - "6767:80"
    environment:
      # Backend URL for nginx proxy (host:port format, no protocol)
      # Override for reverse proxy setups (e.g., excalidash-backend.svc.cluster.local:8000)
      - BACKEND_URL=backend:8000
    depends_on:
      - backend
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      # Use IPv4 loopback explicitly to avoid IPv6 localhost resolution issues.
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  excalidash-network:
    driver: bridge

volumes:
  backend-data:
